<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 660" fill="none">
  <defs>
    <linearGradient id="frameGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8B08A"/>
      <stop offset="15%" stop-color="#D4956B"/>
      <stop offset="40%" stop-color="#C9885E"/>
      <stop offset="60%" stop-color="#D4956B"/>
      <stop offset="80%" stop-color="#E0A57D"/>
      <stop offset="100%" stop-color="#C9885E"/>
    </linearGradient>
    <!-- Clip out the screen area so it's transparent -->
    <mask id="frameMask">
      <rect width="320" height="660" fill="white"/>
      <rect x="14" y="14" width="292" height="632" rx="42" ry="42" fill="black"/>
    </mask>
  </defs>

  <!-- Frame body with screen hole -->
  <g mask="url(#frameMask)">
    <!-- Outer frame -->
    <rect x="2" y="2" width="316" height="656" rx="54" ry="54" fill="url(#frameGrad)" stroke="#B8784E" stroke-width="2"/>
    <!-- Top highlight -->
    <rect x="2" y="2" width="316" height="100" rx="54" ry="54" fill="rgba(255,255,255,0.15)"/>
    <!-- Black inner bezel -->
    <rect x="10" y="10" width="300" height="640" rx="46" ry="46" fill="black"/>
  </g>

  <!-- Dynamic Island (on top of everything) -->
  <rect x="118" y="20" width="84" height="22" rx="11" fill="black"/>
  <!-- Camera lens -->
  <circle cx="186" cy="31" r="5.5" fill="#0d0d1e"/>
  <circle cx="186" cy="31" r="3.5" fill="#08081a" stroke="#1a1a3a" stroke-width="0.5"/>
  <circle cx="186" cy="31" r="1.5" fill="#0a0a2a" opacity="0.8"/>

  <!-- Side buttons -->
  <rect x="316" y="178" width="4" height="58" rx="2" fill="#B8784E" stroke="#A07850" stroke-width="0.5"/>
  <rect x="0" y="148" width="4" height="34" rx="2" fill="#B8784E" stroke="#A07850" stroke-width="0.5"/>
  <rect x="0" y="192" width="4" height="34" rx="2" fill="#B8784E" stroke="#A07850" stroke-width="0.5"/>
  <rect x="0" y="118" width="4" height="18" rx="2" fill="#B8784E" stroke="#A07850" stroke-width="0.5"/>

  <!-- Home indicator -->
  <rect x="120" y="640" width="80" height="4" rx="2" fill="white" opacity="0.3"/>
</svg>